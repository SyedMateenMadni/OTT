spring.application.name=ott-platform

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:ottdb}
spring.datasource.username=${DB_USERNAME:ottuser}
spring.datasource.password=${DB_PASSWORD:ottpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
